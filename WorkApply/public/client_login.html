<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Client Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .form-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #2d3436; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #0984e3; color: white; font-size: 16px; cursor: pointer; }
        button:hover { background: #074d8c; }
        .link { margin-top: 15px; font-size: 14px; }
        .link a { color: #0984e3; text-decoration: none; font-weight: bold; }
        .error { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Client Login</h2>
        <p id="error" class="error"></p>
        <form id="clientLoginForm">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="link">New user? <a href="client_register.html">Register here</a></div>
    </div>
    <script>
        document.getElementById('clientLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(this));
            const res = await fetch('http://localhost:3000/clientLogin', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) window.location.href = 'ClientDashboard.html';
            else document.getElementById('error').textContent = result.message;
        });
    </script>
</body>
</html>
