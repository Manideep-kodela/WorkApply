<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Client Register</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #74b9ff, #0984e3); }
    .form-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.2); width: 350px; text-align: center; }
    h2 { margin-bottom: 20px; color: #2d3436; }
    input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; }
    input:focus { border-color: #0984e3; }
    button { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #0984e3; color: white; font-size: 16px; cursor: pointer; }
    button:hover { background: #074d8c; }
    .link { margin-top: 15px; font-size: 14px; }
    .link a { color: #0984e3; text-decoration: none; font-weight: bold; }
    .link a:hover { text-decoration: underline; }
</style>
</head>
<body>
    <div class="form-container">
        <h2>Client Register</h2>
        <form action="ClientRegisterServlet" method="post">
            <input type="text" id="username" name="username" placeholder="Full Name" required><br>
            <input type="email" name="email" placeholder="Email" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Register</button>
        </form>
        <div class="link">Already registered? <a href="client_login.html">Login here</a></div>
    </div>
</body>
</html>
